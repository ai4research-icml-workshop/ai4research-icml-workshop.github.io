<section id="news" class="section section-alt" aria-labelledby="news-title">
  <div class="section-inner">
    <p class="section-label">News</p>
    <h2 id="news-title" class="section-heading">Announcements</h2>
    <div class="section-divider"></div>
    <ul class="news-list">
      {% for item in site.data.news %}
      <li class="news-item">
        <span class="news-date">{{ item.date }}</span>
        <span class="news-text">{{ item.text }}</span>
      </li>
      {% endfor %}
    </ul>
  </div>
</section>
